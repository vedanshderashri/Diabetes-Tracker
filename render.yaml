services:
  - type: web
    name: vitalhealth-backend
    env: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt && python -m app.ml.train_models
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: vitalhealth-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/medai.db
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma_data
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: ML_MODELS_DIR
        value: ml_models
      - key: OPENAI_API_BASE
        value: https://openrouter.ai/api/v1
      - key: OPENAI_CHAT_MODEL
        value: openai/gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: openai/text-embedding-3-small
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://pharma-git-main-vedanshderashris-projects.vercel.app,http://localhost:3000
