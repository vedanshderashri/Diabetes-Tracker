version: '3.8'

services:
  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://medai:medai_password@postgres:5432/medai_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-medai-production-secret-key}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - UPLOAD_DIR=/app/uploads
      - ML_MODELS_DIR=/app/ml_models
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
      - backend_chroma:/app/chroma_data
      - backend_ml_models:/app/ml_models
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=medai_db
      - POSTGRES_USER=medai
      - POSTGRES_PASSWORD=medai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medai -d medai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  backend_chroma:
  backend_ml_models:
